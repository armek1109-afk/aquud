<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>دليل المناديب - فريق المبيعات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Tajawal', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #eef2f7 0%, #d9e0e8 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #1a2a3f;
        }

        /* حاوية رئيسية بتصميم بطاقات أنيق */
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* الهيدر مع شعار وبساطة */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #1e3c72, #2b4c7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.05);
            letter-spacing: -0.5px;
        }

        .header p {
            color: #2c5a7a;
            font-weight: 500;
            margin-top: 0.5rem;
            font-size: 1rem;
            background: rgba(255,255,240,0.7);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        /* شبكة الكروت - متجاوبة */
        .delegates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 1.8rem;
            margin-bottom: 2rem;
        }

        /* تصميم الكارد العصري */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.5);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 40px -14px rgba(0, 0, 0, 0.25);
            background: white;
        }

        /* رأس البطاقة بلون مميز حسب المندوب */
        .card-header {
            padding: 1.2rem 1.5rem 0.8rem;
            background: linear-gradient(120deg, #f8fafc, #ffffff);
            border-bottom: 3px solid;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-icon {
            width: 52px;
            height: 52px;
            background: #eef2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #1f4a7a;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.2);
        }

        .delegate-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0c2e4e;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        /* محتوى البطاقة */
        .card-body {
            padding: 1.3rem 1.5rem 1.8rem;
            flex: 1;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.2rem;
            font-size: 1rem;
            background: #f1f5f9;
            padding: 0.7rem 1rem;
            border-radius: 24px;
            transition: 0.2s;
        }

        .info-row i.emoji {
            font-size: 1.3rem;
            min-width: 28px;
            text-align: center;
        }

        .info-label {
            font-weight: 600;
            color: #2c577c;
            min-width: 70px;
        }

        .info-value {
            color: #1f2e3e;
            font-weight: 500;
            word-break: break-word;
            direction: ltr;
            text-align: left;
            flex: 1;
        }

        .arabic-text {
            direction: rtl;
            text-align: right;
            font-family: inherit;
        }

        /* زر الاتصال بشكل أنيق */
        .call-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #25b86e;
            color: white;
            padding: 0.65rem 1rem;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 0.8rem;
            width: 100%;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .call-button:hover {
            background: #1f9c5a;
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* تذييل اختياري */
        .footer-note {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: #3a5a7a;
            background: rgba(255,255,245,0.7);
            padding: 0.8rem;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(4px);
        }

        /* تحسين للهواتف */
        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }
            .delegate-name {
                font-size: 1.3rem;
            }
            .card-header {
                padding: 1rem 1.2rem 0.5rem;
            }
            .info-row {
                padding: 0.6rem 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 دليل المناديب المعتمدين</h1>
        <p>📍 فريق المبيعات - تواصل مباشر مع مندوب منطقتك</p>
    </div>

    <div class="delegates-grid" id="delegatesGrid">
        <!-- سيتم تعبئة البيانات ديناميكياً عبر JavaScript -->
    </div>
    <div class="footer-note">
        ⚡ يمكنك الاتصال بأي مندوب مباشرة من خلال الضغط على زر الاتصال | البيانات محدثة 2026
    </div>
</div>

<script>
    // قائمة المناديب: كل مندوب يحتوي على الاسم، المنطقة، رقم الجوال
    // (تمت إضافة 6 مناديب ببيانات نموذجية، يمكن تعديلها بسهولة)
    const delegatesData = [
        {
            id: 1,
            name: "أحمد مصطفى",
            region: "الرياض - حي الملقا",
            phone: "+966512345678",
            avatarColor: "#F59E0B"
        },
        {
            id: 2,
            name: "محمد السيد",
            region: "جدة - الحمراء",
            phone: "+966505678912",
            avatarColor: "#3B82F6"
        },
        {
            id: 3,
            name: "سارة عبدالله",
            region: "الدمام - حي الفيصلية",
            phone: "+966555443322",
            avatarColor: "#EC4899"
        },
        {
            id: 4,
            name: "خالد العمري",
            region: "مكة المكرمة - العزيزية",
            phone: "+966544411199",
            avatarColor: "#10B981"
        },
        {
            id: 5,
            name: "نورة القحطاني",
            region: "المدينة المنورة - قباء",
            phone: "+966599887766",
            avatarColor: "#8B5CF6"
        },
        {
            id: 6,
            name: "عمر الحارثي",
            region: "الخبر - الكورنيش",
            phone: "+966530022334",
            avatarColor: "#EF4444"
        }
    ];

    // دالة لاستخراج الحرف الأول من الاسم (لأيقونة الافتراضي)
    function getInitial(name) {
        if (!name) return "م";
        // إزالة التشكيل البسيط وأخذ أول حرف عربي أو إنجليزي
        const trimmed = name.trim();
        return trimmed.charAt(0);
    }

    // تنسيق رقم الجوال لعمل رابط اتصال tel:
    function formatTel(phone) {
        // إزالة أي مسافات أو شرطات
        let cleanPhone = phone.replace(/\s+/g, '').replace(/-/g, '');
        // إذا لم يبدأ بـ + نضيفه للتأكيد لكن البيانات مفترض فيها +
        if (!cleanPhone.startsWith('+')) {
            // لو كان يبدأ بصفر مثلاً 05... نحولها لصيغة دولية (افتراض السعودية)
            if (cleanPhone.startsWith('05') && cleanPhone.length === 10) {
                cleanPhone = '+966' + cleanPhone.substring(1);
            } else {
                cleanPhone = '+' + cleanPhone;
            }
        }
        return cleanPhone;
    }

    // إنشاء واجهة المناديب وعرضها داخل الشبكة
    function renderDelegates() {
        const gridContainer = document.getElementById('delegatesGrid');
        if (!gridContainer) return;

        let cardsHTML = '';

        delegatesData.forEach(delegate => {
            // تحضير الرقم للاتصال
            const telNumber = formatTel(delegate.phone);
            // الحرف الأول للصورة الرمزية
            const initial = getInitial(delegate.name);
            // لون حدود البطاقة حسب مندوب (اختياري)
            const borderColor = delegate.avatarColor || '#2b4c7c';

            // استخدام html آمن مع توجيه JavaScript جيد
            cardsHTML += `
                <div class="card" style="border-top: 5px solid ${borderColor};">
                    <div class="card-header">
                        <div class="avatar-icon" style="background: ${borderColor}20; color: ${borderColor}; border: 1px solid ${borderColor}40;">
                            ${initial}
                        </div>
                        <div class="delegate-name">${escapeHtml(delegate.name)}</div>
                    </div>
                    <div class="card-body">
                        <div class="info-row">
                            <span class="emoji">📍</span>
                            <span class="info-label">المنطقة:</span>
                            <span class="info-value arabic-text">${escapeHtml(delegate.region)}</span>
                        </div>
                        <div class="info-row">
                            <span class="emoji">📞</span>
                            <span class="info-label">الجوال:</span>
                            <span class="info-value" dir="ltr">${escapeHtml(delegate.phone)}</span>
                        </div>
                        <a href="tel:${telNumber}" class="call-button">
                            📲 اتصل الآن
                        </a>
                    </div>
                </div>
            `;
        });

        gridContainer.innerHTML = cardsHTML;
    }

    // دالة بسيطة لتفادي حقن HTML (لأمان البيانات)
    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // عند تحميل الصفحة بالكامل نقوم بالرسم
    document.addEventListener('DOMContentLoaded', () => {
        renderDelegates();
    });
</script>
</body>
</html>
